    <script type="module">
      import LightningFS from "https://cdn.jsdelivr.net/npm/@isomorphic-git/lightning-fs@4.6.2/+esm";

      import { init } from "./src/index.jsx";

      const fs = new LightningFS("fs");

      // construct the provider and call init here
      init({
        fs,
        resolve: () => Promise.resolve({ ok: true }),
        rename: () => {},
        zip: () => {},
        uploadFile: () => {},
        uploadBlobsLFS: () => {},
        downloadAsset: () => {},
        downloadUrlFromPointer: () => {},
        setAssetPath: () => {},
        getAssetPath: () => {},
        select: () => {},
        selectStream: () => Promise.resolve({ done: true, value: undefined }),
        updateRecord: () => {},
        deleteRecord: () => {},
        buildRecord: () => {},
        init: () => {},
        createLFS: () => {},
        clone: () => {},
        commit: () => {},
        fetchAsset: () => {},
        putAsset: () => {},
        setOrigin: () => {},
        getOrigin: () => Promise.resolve(""),
      });
    </script>
  </body>
