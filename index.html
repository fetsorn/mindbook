<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta
      name="description"
      content="Event editor - Tell the story of your own life"
    />
    <link rel="stylesheet" href="./src/index.css" />
  </head>

  <body>
    <div id="root" class="root"></div>
    <script type="module">
      import mindbook from "./src/index.jsx";
      import schema from "./test/schema.json";
      import { makeApi } from "./test/memory-store.js";

      const api = makeApi();

      const book = await mindbook.create(api);

      book.open({
        schema,
        searchParams: "_=event",
        template: {},
        actions: [],
      });

      book.bind(document.getElementById("root"));
    </script>
  </body>
</html>
